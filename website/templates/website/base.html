{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Kumquat{% endblock %}</title>
    <meta
      name="description"
      content="Kumquat is a digital money product built around a physical cash mental model."
    />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-9CSN4VQC4H"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-9CSN4VQC4H");
    </script>
    <link rel="stylesheet" href="{% static 'website/css/site.css' %}" />
  </head>
  <body>
    <main class="app-shell">
      <div class="page-noise"></div>
      <div class="page-orbit orbit-one"></div>
      <div class="page-orbit orbit-two"></div>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kumquat-elasticsearch.fullname" . }}
  labels:
    {{- include "kumquat-elasticsearch.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kumquat-elasticsearch.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - {{ .Release.Namespace }}

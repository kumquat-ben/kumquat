apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kumquat-blockchain.fullname" . }}
  labels:
    {{- include "kumquat-blockchain.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  serviceName: {{ include "kumquat-blockchain.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "kumquat-blockchain.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kumquat-blockchain.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: blockchain
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mkdir -p /data/kumquat
              sed "s/__NODE_NAME__/${POD_NAME}/g" /config/config.toml.tpl > /data/kumquat/config.toml
              cp /config/genesis.toml /data/kumquat/genesis.toml
              exec /usr/local/bin/kumquat \
                --config /data/kumquat/config.toml \
                --genesis /data/kumquat/genesis.toml \
                --network {{ .Values.networkName | quote }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: p2p
              containerPort: {{ .Values.ports.p2p }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .Values.ports.rpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/kumquat
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kumquat-blockchain.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kumquat-blockchain.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}

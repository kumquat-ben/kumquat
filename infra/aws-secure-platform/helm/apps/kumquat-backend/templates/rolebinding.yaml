{{- if .Values.nodeLauncher.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kumquat-backend.serviceAccountName" . }}
  labels:
    {{- include "kumquat-backend.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kumquat-backend.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kumquat-backend.serviceAccountName" . }}
{{- end }}

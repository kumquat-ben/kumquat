apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kumquat-backend.fullname" . }}
  labels:
    {{- include "kumquat-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kumquat-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kumquat-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.env.existingSecret }}
          env:
            {{- range $name, $value := .Values.env.common }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: node-launcher-data
              mountPath: /var/lib/kumquat-node-launcher
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.nodeLauncher.dind.enabled }}
        - name: node-launcher-dind
          image: "{{ .Values.nodeLauncher.dind.image }}"
          imagePullPolicy: {{ .Values.nodeLauncher.dind.pullPolicy }}
          args:
            {{- toYaml .Values.nodeLauncher.dind.args | nindent 12 }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: node-launcher-data
              mountPath: /var/lib/kumquat-node-launcher
            - name: node-launcher-docker-graph
              mountPath: /var/lib/docker
        {{- end }}
      volumes:
        - name: node-launcher-data
          emptyDir: {}
        {{- if .Values.nodeLauncher.dind.enabled }}
        - name: node-launcher-docker-graph
          emptyDir:
            {{- with .Values.nodeLauncher.dind.storage.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}

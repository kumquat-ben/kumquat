apiVersion: v1
kind: Service
metadata:
  name: {{ include "kumquat-backend.fullname" . }}
  labels:
    {{- include "kumquat-backend.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kumquat-backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

{{- if .Values.nodeLauncher.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kumquat-backend.serviceAccountName" . }}
  labels:
    {{- include "kumquat-backend.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "pods/log", "services", "persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "deployments/scale"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
{{- end }}

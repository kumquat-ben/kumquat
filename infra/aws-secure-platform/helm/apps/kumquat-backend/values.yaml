image:
  repository: 351381968847.dkr.ecr.us-west-2.amazonaws.com/website-backend
  tag: backend-20260417-130522-062cf52-amd64
  pullPolicy: IfNotPresent
  pullSecrets:
    - ecr-pull-secret

env:
  existingSecret: kumquat-backend-env
  common:
    PORT: "8000"
    DJANGO_DEBUG: "false"
    DJANGO_ALLOWED_HOSTS: "*"
    DJANGO_CSRF_TRUSTED_ORIGINS: "https://kumquat.info,https://*.node.kumquat.info"
    DJANGO_SESSION_COOKIE_DOMAIN: ".kumquat.info"
    DJANGO_CSRF_COOKIE_DOMAIN: ".kumquat.info"
    GUNICORN_WORKERS: "2"
    GUNICORN_THREADS: "2"
    GUNICORN_TIMEOUT: "60"
    NODE_PROXY_BASE_DOMAIN: "node.kumquat.info"
    NODE_PROXY_SERVICE_NAME: "kumquat-blockchain-headless"
    NODE_PROXY_NAMESPACE: "kumquat"
    NODE_PROXY_PORT: "8545"
    NODE_PROXY_REQUIRE_AUTH: "true"
    NODE_PROXY_ALLOWED_METHODS: "GET,HEAD,OPTIONS"
    NODE_PROXY_TIMEOUT_SECONDS: "15"
    NODE_PROXY_LOGIN_URL: "https://kumquat.info/auth/google/start"
    EXPLORER_API_URL: "http://kumquat-blockchain.kumquat.svc.cluster.local:8545"
    NODE_LAUNCHER_ENABLED: "true"
    NODE_LAUNCHER_KUBERNETES_NAMESPACE: "kumquat"
    NODE_LAUNCHER_IMAGE: "351381968847.dkr.ecr.us-west-2.amazonaws.com/kumquat-blockchain:blockchain-20260415-174001-9048638"
    NODE_LAUNCHER_IMAGE_PULL_POLICY: "IfNotPresent"
    NODE_LAUNCHER_IMAGE_PULL_SECRETS: "ecr-pull-secret"
    NODE_LAUNCHER_RUST_LOG: "info,kumquat=debug"
    NODE_LAUNCHER_NETWORK: "dev"
    NODE_LAUNCHER_CHAIN_ID: "1337"
    NODE_LAUNCHER_GENESIS_FILE: "/app/genesis.toml"
    NODE_LAUNCHER_GENESIS_HASH: "401bb67bf4fca89ffc5b492833ede77e8f3bcb2a61ef54cf522cc90beb0170c4"
    NODE_LAUNCHER_BASE_API_PORT: "18545"
    NODE_LAUNCHER_BASE_P2P_PORT: "30380"
    NODE_LAUNCHER_BASE_METRICS_PORT: "19100"
    NODE_LAUNCHER_GENESIS_SEED_HOST: ""
    NODE_LAUNCHER_GENESIS_SEED_PORT: "30333"
    NODE_LAUNCHER_GENESIS_SEED_SERVICE_NAME: "kumquat-blockchain-headless"
    NODE_LAUNCHER_STORAGE_CLASS_NAME: "kumquat-mysql-gp3"
    NODE_LAUNCHER_STORAGE_SIZE: "20Gi"
    NODE_LAUNCHER_NODE_SELECTOR: "workload=application"

service:
  port: 8000
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: kumquat.info
  paths:
    - path: /
      pathType: Prefix
  extraHosts:
    - host: "*.node.kumquat.info"
      paths:
        - path: /
          pathType: Prefix

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  workload: application

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 10001

nodeLauncher:
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true

image:
  repository: 351381968847.dkr.ecr.us-west-2.amazonaws.com/website-backend
  tag: backend-20260422-093842-66ef3ba-amd64
  pullPolicy: IfNotPresent
  pullSecrets:
    - ecr-pull-secret

env:
  existingSecret: kumquat-backend-env
  common:
    PORT: "8000"
    DJANGO_DEBUG: "false"
    DJANGO_ALLOWED_HOSTS: "*"
    DJANGO_CSRF_TRUSTED_ORIGINS: "https://kumquat.info,https://*.node.kumquat.info"
    DJANGO_SESSION_COOKIE_DOMAIN: ".kumquat.info"
    DJANGO_CSRF_COOKIE_DOMAIN: ".kumquat.info"
    GUNICORN_WORKERS: "2"
    GUNICORN_THREADS: "2"
    GUNICORN_TIMEOUT: "60"
    NODE_PROXY_BASE_DOMAIN: "node.kumquat.info"
    NODE_PROXY_SERVICE_NAME: "kumquat-blockchain-headless"
    NODE_PROXY_NAMESPACE: "kumquat"
    NODE_PROXY_PORT: "8545"
    NODE_PROXY_REQUIRE_AUTH: "true"
    NODE_PROXY_ALLOWED_METHODS: "GET,HEAD,OPTIONS"
    NODE_PROXY_TIMEOUT_SECONDS: "15"
    NODE_PROXY_LOGIN_URL: "https://kumquat.info/auth/google/start"
    # Public explorer traffic reads from the shared blockchain StatefulSet RPC service.
    EXPLORER_API_URL: "http://kumquat-blockchain.kumquat.svc.cluster.local:8545"
    NODE_LAUNCHER_ENABLED: "true"
    NODE_LAUNCHER_KUBERNETES_NAMESPACE: "kumquat"
    NODE_LAUNCHER_IMAGE: "351381968847.dkr.ecr.us-west-2.amazonaws.com/kumquat-blockchain:blockchain-20260422-replayfix-4a23f7b"
    NODE_LAUNCHER_IMAGE_PULL_POLICY: "IfNotPresent"
    NODE_LAUNCHER_IMAGE_PULL_SECRETS: "ecr-pull-secret"
    NODE_LAUNCHER_RUST_LOG: "info,kumquat=debug"
    NODE_LAUNCHER_NETWORK: "dev"
    # Managed nodes must stay on the same chain identity as the shared seed node.
    NODE_LAUNCHER_CHAIN_ID: "1337"
    NODE_LAUNCHER_GENESIS_CEREMONY_FILE: "/app/blockchain/genesis.ceremony.json"
    NODE_LAUNCHER_GENESIS_FILE: "/app/blockchain/genesis.toml"
    NODE_LAUNCHER_BASE_API_PORT: "18545"
    NODE_LAUNCHER_BASE_P2P_PORT: "30380"
    NODE_LAUNCHER_BASE_METRICS_PORT: "19100"
    # Force managed nodes to bootstrap from the same blockchain StatefulSet instead of
    # relying on the launcher's fallback seed-selection path.
    NODE_LAUNCHER_GENESIS_SEED_HOST: "kumquat-blockchain-headless.kumquat.svc.cluster.local"
    NODE_LAUNCHER_GENESIS_SEED_PORT: "30333"
    NODE_LAUNCHER_GENESIS_SEED_SERVICE_NAME: "kumquat-blockchain-headless"
    NODE_LAUNCHER_STORAGE_CLASS_NAME: "kumquat-mysql-gp3"
    NODE_LAUNCHER_STORAGE_SIZE: "20Gi"
    NODE_LAUNCHER_NODE_SELECTOR: "workload=application"
    ELASTICSEARCH_URL: "http://kumquat-elasticsearch:9200"
    ELASTICSEARCH_INDEX_PREFIX: "kumquat"

service:
  port: 8000
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: kumquat.info
  paths:
    - path: /
      pathType: Prefix
  extraHosts:
    - host: "*.node.kumquat.info"
      paths:
        - path: /
          pathType: Prefix

replicaCount: 2

manualScriptWorker:
  enabled: true
  name: manual-script-worker
  replicaCount: 1
  resources:
    requests:
      cpu: 750m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    ENABLE_SCRAPER_SCHEDULER: "false"
    ENABLE_MANUAL_SCRIPT_SCHEDULER: "true"
    MANUAL_SCRIPT_QUEUE_CONCURRENCY: "2"
    MANUAL_SCRIPT_QUEUE_POLL_SECONDS: "2"
    MANUAL_SCRIPT_WORKER_NAMESPACE: "kumquat"
    MANUAL_SCRIPT_WORKER_DEPLOYMENT: "manual-script-worker"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  startup:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  readiness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /healthz
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

nodeSelector:
  workload: application

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 10001

nodeLauncher:
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true

searchIndex:
  enabled: true

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-app-default-deny-ingress
  namespace: sample-app
spec:
  podSelector:
    matchLabels:
      app: sample-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
